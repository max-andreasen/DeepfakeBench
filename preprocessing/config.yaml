preprocess:
  dataset_name: # the name of dataset
    choices:
      [
        "FaceForensics++",
        "Celeb-DF-v1",
        "Celeb-DF-v2",
        "Celeb-DF-v3",
        "WildDeepfakes",
        "DFDCP",
        "DFDC",
        "DeeperForensics-1.0",
        "UADFV",
      ]
    default: "Celeb-DF-v2"
  dataset_root_path: # the root path to the dataset
    type: str
    default: "/home/max-andreasen/GitHub/DeepfakeBench/datasets/rgb"
  comp: # the compression level of videos, only in the dataset of FaceForensics++.
    choices: ["raw", "c23", "c40"]
    default: "c23"
  mode: # based on the numbers of frame or skip the specific stride of frames.
    choices: ["fixed_num_frames", "fixed_stride"]
    default: "fixed_stride"
  stride: # when 'mode' is 'fixed_stride', 'stride' is the number of frames to skip between each frame extracted.
    type: int
    default: 1
  num_frames: # when 'mode' is 'fixed_num_frames', 'num_frames' is the number of frames to extract from each video.
    type: int
    default: 32

rearrange:
  dataset_name: # the name of dataset
    choices:
      [
        "FaceForensics++",
        "DeepFakeDetection",
        "Celeb-DF-v1",
        "Celeb-DF-v2",
        "Celeb-DF-v3",
        "WildDeepfakes",
        "DFDCP",
        "DFDC",
        "DeeperForensics-1.0",
        "UADFV",
        "FaceShifter",
      ]
    default: "WildDeepfakes"
  dataset_root_path: # the root path to the dataset
    type: str
    default: "/home/max-andreasen/GitHub/DeepfakeBench/datasets/rgb"
  output_file_path: # the json path to the dataset
    type: str
    default: "../preprocessing/rearrangements/dataset_json_mtcnn"
  comp: # the compression level of videos, only in the dataset of FaceForensics++.
    choices: ["raw", "c23", "c40"]
    default: "c23"
  frame_dir: # subdirectory name containing extracted frames (e.g. "frames" for dlib, "mtcnn_frames" for MTCNN)
    type: str
    default: "mtcnn_frames"
  perturbation: # Extensive real-world perturbations are applied to DeeperForensics-1.0 dataset
    choices:
      [
        "end_to_end",
        "end_to_end_level_1",
        "end_to_end_level_2",
        "end_to_end_level_3",
        "end_to_end_level_4",
        "end_to_end_level_5",
        "end_to_end_mix_2_distortions",
        "end_to_end_mix_3_distortions",
        "end_to_end_mix_4_distortions",
        "end_to_end_random_level",
        "reenact_postprocess",
      ]
    default: "end_to_end"

preprocess_mtcnn:
  dataset_name:
    choices:
      [
        "FaceForensics++",
        "Celeb-DF-v1",
        "Celeb-DF-v2",
        "Celeb-DF-v3",
        "WildDeepfakes",
        "DFDCP",
        "DFDC",
        "DeeperForensics-1.0",
        "UADFV",
      ]
    default: "Celeb-DF-v3"
  dataset_root_path:
    type: str
    default: "/home/max-andreasen/GitHub/DeepfakeBench/datasets/rgb"
  comp:
    choices: ["raw", "c23", "c40"]
    default: "c23"
  device:
    choices: ["cuda", "cpu"]
    default: "cuda"
  output_resolution:
    type: int
    default: 256
  bbox_padding_scale:
    type: float
    default: 1.15
  num_frames:
    type: int
    default: 96

preprocess_wildd:
  # WildDeepfakes-specific preprocessing (no MTCNN — frames are already 224x224
  # face crops). Uses a smaller window than preprocess_mtcnn because many WDF
  # clips are <96 frames; 48 covers >99% of videos while still fitting one
  # inference window (32) with slack.
  dataset_root_path:
    type: str
    default: "/home/max-andreasen/GitHub/DeepfakeBench/datasets/rgb"
  num_frames:
    type: int
    default: 48

to_lmdb:
  dataset_name: # the name of dataset
    choices:
      [
        "FaceForensics++",
        "DeepFakeDetection",
        "Celeb-DF-v1",
        "Celeb-DF-v2",
        "Celeb-DF-v3",
        "WildDeepfakes",
        "DFDCP",
        "DFDC",
        "DeeperForensics-1.0",
        "UADFV",
        "FaceShifter",
      ]
    default: "FaceForensics++"
  dataset_root_path: # the root path to the dataset
    type: str
    default: "./datasets_v2"
  output_lmdb_dir: # the json path to the dataset
    type: str
    default: "./datasets_lmdbs"
  comp: # the compression level of videos, only in the dataset of FaceForensics++.
    choices: ["raw", "c23", "c40"]
    default: "c23"
