# CLIP embedding template config.
# Run with:  python clip/embed.py --config clip/configs/config_name.yaml

# --- what to embed ------------------------------------------------------------
dataset_name: FaceForensics++
input_json: preprocessing/rearrangements/dataset_json_mtcnn/FaceForensics++.json

# --- where outputs go ---------------------------------------------------------
output_base_dir: clip/embeddings/mtcnn/

# --- model --------------------------------------------------------------------
model:
  name: ViT-L-14-336-quickgelu
  pretrained: openai

# --- what to extract ----------------------------------------------------------
# pre_proj (CLS after ln_post, e.g. 1024-d) is ALWAYS saved — not configurable.
# include_final: save the projected CLS (e.g. 768-d) into final/.
# blocks: list of transformer block indices (0..num_blocks-1) whose CLS token
#         will be saved into block_<idx>/. Empty = only pre_proj (+ final).
extract:
  blocks: [] # e.g. [4, 8, 12, 16, 20] for layer-wise AUC probing
  include_final: true

# --- sampling -----------------------------------------------------------------
T: 96 # frames per window
batch_size:
  null # CLIP forward batch size. null = all T frames in one forward (fastest).
  # Set an int (e.g. 32) only if OOM.
seed: 1024

# --- runtime ------------------------------------------------------------------
device: cuda
max_videos: null # null = all; int = cap total videos (debugging)
