tag: peft_ln_ff_mtcnn

# data
root_dir: /home/max-andreasen/GitHub/DeepfakeBench
split_file: datasets/splits/FaceForensics++.csv
rearrange_json: preprocessing/rearrangements/dataset_json_mtcnn/FaceForensics++.json
dataset_name: FaceForensics++
num_frames: { train: 32, val: 32 }

# model
clip:
  name: ViT-L-14-336-quickgelu
  pretrained: openai
  ln_scope: all                    # all | ln_post | last_n:<int>
  grad_checkpointing: true
  amp_dtype: fp16                  # fp16 | bf16 | fp32

temporal:
  clip_embed_dim: 1024
  num_frames: 32
  num_classes: 2
  num_layers: 8
  n_heads: 8
  dim_feedforward: 3072
  attn_dropout: 0.1
  mlp_dropout: 0.4
  mlp_hidden_dim: 512

# optim (YAML floats need explicit decimal — see feedback_yaml_float_notation.md)
optimizer:
  type: adamw
  lr: 2.0e-5
  weight_decay: 5.0e-4
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-8

lr_scheduler: cosine               # cosine | cosine_warmup | constant
num_epochs: 30
warmup_epochs: 2

# runtime
batchSize: { train: 4, val: 4 }
grad_accum_steps: 8
workers: 4
seed: 1024
device: cuda

# output
log_dir: peft/trained
save_ckpt: true
metric_scoring: auc

# optional cap (omit or null for full dataset)
max_videos: null
