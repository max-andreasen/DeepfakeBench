tag: peft_ff_cdfv2val

# Training data — FF++ (same as main training config)
root_dir: /home/max-andreasen/GitHub/DeepfakeBench
split_file: datasets/splits/FaceForensics++.csv
rearrange_json: preprocessing/rearrangements/dataset_json_mtcnn/FaceForensics++.json
dataset_name: FaceForensics++
num_frames: { train: 32, val: 32 }

# Validation data — CDFv2 clean val split (300 fake + 230 real, disjoint from test)
val_split_file:     datasets/splits/Celeb-DF-v2-clean.csv
val_rearrange_json: preprocessing/rearrangements/dataset_json_mtcnn/Celeb-DF-v2.json
val_dataset_name:   Celeb-DF-v2
val_split:          val

# model
clip:
  name: ViT-L-14-336-quickgelu
  pretrained: openai
  ln_scope: all
  feature_layer: pre_proj        # search choices below: pre_proj | block_16
  l2_normalize_features: true    # search choices below: true | false
  grad_checkpointing: true
  amp_dtype: fp16

temporal:
  clip_embed_dim: 1024
  num_frames: 32
  num_classes: 2
  num_layers: 1
  n_heads: 8
  dim_feedforward: 1024
  attn_dropout: 0.0
  mlp_dropout: 0.25
  mlp_hidden_dim: 256

optimizer:
  type: adamw
  lr: 2.0e-5
  weight_decay: 1.0e-4
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-8

loss:
  ua_enabled: true
  alignment_weight: 0.1
  uniformity_weight: 0.5

lr_scheduler: cosine_warmup
num_epochs: 5
warmup_epochs: 1

batchSize: { train: 8, val: 8 }
grad_accum_steps: 2
workers: 16
seed: 1024
device: cuda

log_dir: peft/trained
save_ckpt: true
metric_scoring: auc

max_videos: null

# Optuna search-space snapshot for the first PEFT search.
# Narrowed after reviewing Yermakov et al. / GenD (WACV 2026): their best
# detector is frame-level LN tuning + L2-normalized CLS + linear frame head,
# and their temporal attention ablation did not noticeably improve over
# probability averaging. Keep this search focused on small temporal heads.
# The training entry point ignores this block; the PEFT Optuna launcher should
# sample from it and write sampled values into clip/temporal/optimizer above.
search_space:
  clip.feature_layer:
    type: categorical
    choices: [pre_proj, block_16]
  clip.l2_normalize_features:
    type: categorical
    choices: [true, false]
  loss.ua_enabled:
    type: categorical
    choices: [true, false]
  optimizer.lr:
    type: float
    range: [1.0e-5, 4.0e-5]
    log: true
  optimizer.weight_decay:
    type: categorical
    choices: [0.0, 1.0e-5, 1.0e-4, 5.0e-4]
  temporal.num_layers:
    type: categorical
    choices: [1, 2, 4]
  temporal.dim_feedforward:
    type: categorical
    choices: [1024, 2048]
  temporal.attn_dropout:
    type: categorical
    choices: [0.0, 0.1]
  temporal.mlp_dropout:
    type: float
    range: [0.1, 0.4]
  temporal.mlp_hidden_dim:
    type: categorical
    choices: [256, 512]
