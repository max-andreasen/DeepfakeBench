log_dir: trained/
model_type: linear

model:
  transformer:
    clip_embed_dim: 1024
    num_frames: 32
    num_classes: 2
    num_layers: 8
    n_heads: 8
    dim_feedforward: 3072
    attn_dropout: 0.1
    mlp_dropout: 0.4
  linear:
    clip_embed_dim: 1024
    num_classes: 2
  bigru:
    clip_embed_dim: 1024
    hidden_dim: 512
    num_layers: 2
    gru_dropout: 0.1
    mlp_dropout: 0.4
    num_classes: 2

root_dir: "/home/max-andreasen/GitHub/DeepfakeBench"
split_file: "datasets/splits/FaceForensics++.csv"
catalogue_file:

compression: c23
batchSize: { "train": 96, "val": 64 }
workers: 4
num_frames: { "train": 32, "val": 32 }
# 'none' = raw embeddings, 'diff' = x_t - x_{t-1} (T shrinks by 1).
input_transform: none
resolution: 256
save_ckpt: false
save_feat: false

optimizer:
  type: adamw
  adam:
    lr: 0.00002
    beta1: 0.9
    beta2: 0.999
    eps: 0.00000001
    weight_decay: 2.0e-5 # top-5 clustered near 2e-5
    amsgrad: false
  adamw:
    lr: 0.001
    beta1: 0.9
    beta2: 0.999
    eps: 0.00000001
    weight_decay: 2.0e-5 # top-5 clustered near 2e-5
  sgd:
    lr: 0.00002
    momentum: 0.9
    weight_decay: 0.0005

lr_scheduler: "constant"
step_size: 10
step_gamma: 0.1
warmup_epochs: 5

num_epochs: 25
start_epoch: 0
save_epoch: 1
rec_iter: 100
logdir: ./logs
seed: 1024

metric_scoring: auc

all_dataset:
  [
    FaceForensics++,
    FF-F2F,
    FF-DF,
    FF-FS,
    FF-NT,
    FaceShifter,
    DeepFakeDetection,
    Celeb-DF-v1,
    Celeb-DF-v2,
    DFDCP,
    DFDC,
    DeeperForensics-1.0,
    UADFV,
    stargan,
  ]
train_dataset: [FaceForensics++]
val_dataset: [FaceForensics++]

label_dict:
  DFD_fake: 1
  DFD_real: 0
  FF-SH: 1
  FF-F2F: 1
  FF-DF: 1
  FF-FS: 1
  FF-NT: 1
  FF-FH: 1
  FF-real: 0
  CelebDFv1_real: 0
  CelebDFv1_fake: 1
  CelebDFv2_real: 0
  CelebDFv2_fake: 1
  DFDCP_Real: 0
  DFDCP_FakeA: 1
  DFDCP_FakeB: 1
  DFDC_Fake: 1
  DFDC_Real: 0
  DF_fake: 1
  DF_real: 0
  UADFV_Fake: 1
  UADFV_Real: 0
  0_real: 0
  1_fake: 1
  real: 0
  fake: 1

device: cuda
cuda: true
cudnn: true
