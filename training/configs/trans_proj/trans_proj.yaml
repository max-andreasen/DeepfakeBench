# log dir
log_dir: trained/
# model setting
model_type: transformer # must match a key in MODELS dict: transformer, linear, bigru

# per-model constructor kwargs; train.py uses config['model'][model_type]
model:
  transformer:
    clip_embed_dim: 768
    num_frames: 32
    num_classes: 2
    num_layers: 8
    n_heads: 8
    dim_feedforward: 3072
    attn_dropout: 0.1
    mlp_dropout: 0.4
  linear:
    clip_embed_dim: 768
    num_classes: 2
  bigru:
    clip_embed_dim: 768
    num_classes: 2

# Split CSVs (dataset, label_cat, video_id, split) — from datasets/create_split.py
# Catalogue CSVs (dataset, label_cat, video_id, label, embedding_file, ...) — from CLIP embedding run
# The dataset class joins on (dataset, label_cat, video_id) then filters by split.
root_dir: "/home/max-andreasen/GitHub/DeepfakeBench"
split_file: "datasets/splits/FaceForensics++.csv"
catalogue_file: "clip/embeddings/mtcnn/ViT-L-14-336-quickgelu_dim768/catalogue.csv"

compression: c23 # compression-level for videos
batchSize: { "train": 96, "val": 64 }
workers: 4 # number of data loading workers
num_frames: { "train": 32, "val": 32 } # number of frames to use per video in training and testing
resolution: 256 # resolution of output image to network
save_ckpt: false # whether to save checkpoint
save_feat: false # whether to save features

# optimizer config
optimizer:
  # choose between 'adam', 'adamw' and 'sgd'
  type: adamw
  adam:
    lr: 0.00002 # learning rate
    beta1: 0.9 # beta1 for Adam optimizer
    beta2: 0.999 # beta2 for Adam optimizer
    eps: 0.00000001 # epsilon for Adam optimizer
    weight_decay: 0.0005 # weight decay for regularization
    amsgrad: false
  adamw:
    lr: 0.00002 # learning rate
    beta1: 0.9 # beta1 for Adam optimizer
    beta2: 0.999 # beta2 for Adam optimizer
    eps: 0.00000001 # epsilon for Adam optimizer
    weight_decay: 0.0005 # weight decay for regularization
  sgd:
    lr: 0.00002 # learning rate
    momentum: 0.9 # momentum for SGD optimizer
    weight_decay: 0.0005 # weight decay for regularization

# training config
lr_scheduler: "cosine" # learning rate scheduler
step_size: 10 # step size for learning rate scheduler
step_gamma: 0.1
warmup_epochs: 5

num_epochs: 50 # number of epochs to train for
start_epoch: 0 # manual epoch number (useful for restarts)
save_epoch: 1 # interval epochs for saving models
rec_iter: 100 # interval iterations for recording
logdir: ./logs # folder to output images and logs
seed: 1024 # manual seed for random number generation

# metric
metric_scoring: auc # metric for evaluation (auc, acc, eer, ap)

# dataset
all_dataset:
  [
    FaceForensics++,
    FF-F2F,
    FF-DF,
    FF-FS,
    FF-NT,
    FaceShifter,
    DeepFakeDetection,
    Celeb-DF-v1,
    Celeb-DF-v2,
    DFDCP,
    DFDC,
    DeeperForensics-1.0,
    UADFV,
    stargan,
  ]
train_dataset: [FaceForensics++]
val_dataset: [Celeb-DF-v2]

# label settings
label_dict:
  # DFD
  DFD_fake: 1
  DFD_real: 0
  # FF++ + FaceShifter(FF-real+FF-FH)
  FF-SH: 1
  FF-F2F: 1
  FF-DF: 1
  FF-FS: 1
  FF-NT: 1
  FF-FH: 1
  FF-real: 0
  # CelebDF
  CelebDFv1_real: 0
  CelebDFv1_fake: 1
  CelebDFv2_real: 0
  CelebDFv2_fake: 1
  # DFDCP
  DFDCP_Real: 0
  DFDCP_FakeA: 1
  DFDCP_FakeB: 1
  # DFDC
  DFDC_Fake: 1
  DFDC_Real: 0
  # DeeperForensics-1.0
  DF_fake: 1
  DF_real: 0
  # UADFV
  UADFV_Fake: 1
  UADFV_Real: 0
  #stargan
  0_real: 0
  1_fake: 1
  real: 0
  fake: 1

# data augmentation
use_data_augmentation: false # Add this flag to enable/disable data augmentation
data_aug:
  flip_prob: 0.5
  rotate_prob: 0.5
  rotate_limit: [-10, 10]
  blur_prob: 0.5
  blur_limit: [3, 7]
  brightness_prob: 0.5
  brightness_limit: [-0.1, 0.1]
  contrast_limit: [-0.1, 0.1]
  quality_lower: 40
  quality_upper: 100

# mean and std for normalization
mean: [0.5, 0.5, 0.5]
std: [0.5, 0.5, 0.5]

# cuda
device: cuda # torch device: 'cuda' or 'cpu'
cuda: true # whether to use CUDA acceleration
cudnn: true # whether to use CuDNN for convolution operations
